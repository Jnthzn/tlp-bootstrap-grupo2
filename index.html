<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
      <a class="navbar-brand d-flex align-items-center ms-5" href="index.html">
        <img
          src="assets/img/quincy-logo.jpg"
          alt="Logo"
          width="80"
          height="80"
          class="quincy-logo"
        />
      </a>
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Quincy® Smash Burgers</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarText"
          aria-controls="navbarText"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="index.html"
                >Inicio</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Pedir</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Ubicación</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contacto</a>
            </li>
          </ul>
          <span class="navbar-text"> Cuidado: Nuestras burgers crean adicción </span>
        </div>
      </div>
    </nav>

    <main class="bgcolor-main py-4">
      <div class="container mt-4">
        <div id="carouselExampleIndicators" class="carousel slide w-75 mx-auto">
          <div class="carousel-indicators">
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="0"
              class="active"
              aria-current="true"
              aria-label="Slide 1"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="1"
              aria-label="Slide 2"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="2"
              aria-label="Slide 3"
            ></button>
          </div>
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img
                src="assets/img/combo-promo.png"
                class="d-block w-100"
                alt="combo-promo"
              />
            </div>
            <div class="carousel-item">
              <img
                src="assets/img/cupones.png"
                class="d-block w-100"
                alt="cupones"
              />
            </div>
            <div class="carousel-item">
              <img
                src="assets/img/hamburguesa.png"
                class="d-block w-100"
                alt="hamburguesa"
              />
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
        <section class="text-center my-5">
          <h2 class="text-white">Bienvenido a Quincy® Smash Burgers</h2>
          <p class="text-white">Smash burgers house.</p>
        </section>
      </div>
    </main>

    <footer class="bg-black text-white pt-4 pb-2">
      <div class="text-center p-2">
        <p class="mb-0">© 2026 Quincy® Smash Burgers - Todos los derechos reservados</p>
      </div>
    </footer>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
